[workspace]
authors = ["Conor Bronsdon <cmbronsdon@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "mojo-xml"
description = "General-purpose XML parsing in pure Mojo — an ElementTree-shaped API"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
test = "mojo run -I src test/test_etree.mojo && mojo run -I src test/test_pull.mojo"
demo = "mojo run -I src examples/parse_svg.mojo"

[dependencies]
mojo = ">=1.0.0b3.dev2026070506,<2"
